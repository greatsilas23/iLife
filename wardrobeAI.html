<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wardrobe AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #222;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    h1 { margin: 0; }
    .container { padding: 1rem; }
    .section { margin-bottom: 2rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 1rem;
      margin: 0.5rem 0;
    }
    .card button {
      background: #007bff;
      border: none;
      color: #fff;
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }
    .card button:hover { background: #0056b3; }
    input, select {
      padding: 0.5rem;
      margin: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #wardrobe-list, #explore-list, #for-you-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>👔 Wardrobe AI</h1>
    <p>Beat decision fatigue. Dress with confidence.</p>
  </header>
  <div class="container">

    <!-- Wardrobe -->
    <div class="section">
      <h2>Your Wardrobe</h2>
      <form id="wardrobe-form">
        <input type="text" id="item-name" placeholder="Clothing item" required />
        <select id="item-icon">
          <option value="👕">👕 Shirt</option>
          <option value="👖">👖 Pants</option>
          <option value="👗">👗 Dress</option>
          <option value="🧥">🧥 Jacket</option>
          <option value="👟">👟 Shoes</option>
        </select>
        <button type="submit">Add</button>
      </form>
      <div id="wardrobe-list"></div>
    </div>

    <!-- AI Dresser -->
    <div class="section" id="dresser">
      <h2>AI Dresser</h2>
      <p>Loading outfit suggestion...</p>
    </div>

    <!-- Explore -->
    <div class="section" id="explore">
      <h2>Explore Outfits</h2>
      <div id="explore-list">Loading explore outfits...</div>
    </div>

    <!-- For You -->
    <div class="section" id="for-you">
      <h2>For You</h2>
      <form id="post-form">
        <input type="text" id="username" placeholder="Your name" required />
        <input type="text" id="outfit-desc" placeholder="Describe your outfit" required />
        <button type="submit">Post</button>
      </form>
      <div id="for-you-list">Loading posts...</div>
    </div>

  </div>

  <script>
    const API_URL = "http://127.0.0.1:5000/api/wardrobe";
    const DRESSER_URL = "http://127.0.0.1:5000/api/dresser";
    const EXPLORE_URL = "http://127.0.0.1:5000/api/explore";
    const POSTS_URL = "http://127.0.0.1:5000/api/posts";

    // --- Wardrobe Functions ---
    async function loadWardrobe() {
      const res = await fetch(API_URL);
      const data = await res.json();
      const list = document.getElementById("wardrobe-list");
      list.innerHTML = "";
      data.wardrobe.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `${item.icon} ${item.name}
          <br>
          <button onclick="deleteItem(${item.id})">Delete</button>`;
        list.appendChild(div);
      });
    }

    async function addItem(name, icon) {
      await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, icon })
      });
      loadWardrobe();
      loadDresser();
    }

    async function deleteItem(id) {
      await fetch(`${API_URL}/${id}`, { method: "DELETE" });
      loadWardrobe();
      loadDresser();
    }

    document.getElementById("wardrobe-form").addEventListener("submit", e => {
      e.preventDefault();
      const name = document.getElementById("item-name").value;
      const icon = document.getElementById("item-icon").value;
      addItem(name, icon);
      e.target.reset();
    });

    // --- AI Dresser ---
    async function loadDresser() {
      const res = await fetch(DRESSER_URL);
      const data = await res.json();
      document.getElementById("dresser").innerHTML = `
        <h2>AI Dresser</h2>
        <div class="card">
          <p>👕 Suggested Outfit: ${data.outfit}</p>
          <p>💡 Tip: ${data.tip}</p>
          <button>Shop Similar Outfits</button>
        </div>
      `;
    }

    // --- Explore Outfits ---
    async function loadExplore() {
      const res = await fetch(EXPLORE_URL);
      const data = await res.json();
      const list = document.getElementById("explore-list");
      list.innerHTML = "";
      data.explore.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          ${item.icon} ${item.name}
          <br>
          <button onclick="addItem('${item.name}', '${item.icon}')">
            ➕ Add to Wardrobe
          </button>
        `;
        list.appendChild(div);
      });
    }

    // --- For You Page (Posts) ---
    async function loadPosts() {
      const res = await fetch(POSTS_URL);
      const data = await res.json();
      const list = document.getElementById("for-you-list");
      list.innerHTML = "";
      data.posts.forEach(post => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<b>${post.user}</b>: ${post.outfit}`;
        list.appendChild(div);
      });
    }

    document.getElementById("post-form").addEventListener("submit", async e => {
      e.preventDefault();
      const user = document.getElementById("username").value;
      const outfit = document.getElementById("outfit-desc").value;
      await fetch(POSTS_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user, outfit })
      });
      e.target.reset();
      loadPosts();
    });

    // Initial load
    loadWardrobe();
    loadDresser();
    loadExplore();
    loadPosts();
  </script>
</body>
</html>
